###############################################################################
# FormBuilder — Backend CI/CD
# Triggers on pushes to backend/ on main branch
# Builds Docker image → pushes to Artifact Registry → deploys to Cloud Run
# Inyecta API keys desde GitHub Secrets como env vars en Cloud Run
###############################################################################

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: formbuilder-backend
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/formbuilder/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/formbuilder/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/formbuilder/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/formbuilder/${{ env.SERVICE_NAME }}:latest

      - name: Get Frontend URL
        id: frontend
        run: |
          URL=$(gcloud run services describe formbuilder-frontend \
            --region ${{ env.REGION }} \
            --format 'value(status.url)' 2>/dev/null || echo "https://formbuilder-frontend.run.app")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run with env vars
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/formbuilder/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --update-env-vars "\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }},\
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }},\
          FRONTEND_URL=${{ steps.frontend.outputs.url }}"

      - name: Run database migrations
        run: |
          gcloud run jobs execute formbuilder-migrate \
            --region ${{ env.REGION }} \
            --wait \
            2>/dev/null || echo "Migration job not found — skipping (run manually on first deploy)"

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "### Backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
